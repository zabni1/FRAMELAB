    <div id="loader" class="htmx-indicator">Завантаження...</div>
    <div hx-get="{% url 'get_messages' page %}"
         hx-target="#chat"
         hx-indicator="#loader"
         hx-swap="afterend"
         hx-trigger="revealed"></div>
    <div class="messages">
            {% for a in messages %}
                {% if a.user1 == request.user.pk %}
                <h5 class="message user_message">{{ a.message }}</h5>
                {% else %}
                <h5 class="message">{{ a.message }}</h5>
                {% endif %}
            {% endfor %}
    </div>
