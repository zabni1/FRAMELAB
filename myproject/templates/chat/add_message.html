

    <div class="messages">
            {% for a in messages %}
                {% if a.user1 == request.user.pk %}
                <h5 class="message user_message">{{ a.message }}</h5>
                {% else %}
                <h5 class="message">{{ a.message }}</h5>
                {% endif %}
            {% endfor %}
    </div>

    <div hx-get="{% url 'get_message' message %}"
         hx-target="#chat"
         hx-swap="innerHTML"
         hx-trigger="load"></div>
    <form hx-post="{% url 'add_message' %}"
          hx-target="#chat"
          hx-swap="innerHTML">
          {% csrf_token %}
          <input name="message"
                 type="text"
                 readonly>


    </form>
