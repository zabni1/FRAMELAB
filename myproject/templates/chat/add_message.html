

{% for a in messages %}
        {% if a.user1 == request.user.pk %}
        <h3 class="user_messages">{{ a.message }}</h3>
        {% else %}
        <h3 class="replies">{{ a.message }}</h3>
        {% endif %}
    {% endfor %}

    <div hx-get="{% url 'get_message' message %}"
         hx-target="#chat"
         hx-swap="innerHTML"
         hx-trigger="revealed"></div>
    <form hx-post="{% url 'add_message' %}"
          hx-target="#chat"
          hx-swap="innerHTML">
          {% csrf_token %}
          <input name="message"
                 type="text"
                 readonly>

        <button type="submit">Відправити</button>
    </form>
