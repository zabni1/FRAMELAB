{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href='https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
    <link rel="stylesheet" href="{% static 'main/css/index.css' %}">
    <link rel="stylesheet" href="{% static 'login/css/login.css' %}">
    <link rel="stylesheet" href="{% static 'main/css/category.css' %}">
    <link rel="stylesheet" href="{% static 'chat/css/chat.css' %}">
    <link rel="stylesheet" href="{% static 'topic/css/topics.css' %}">
</head>
<body>
    <div id='layout'>
        <header class="container">
            <span class="logo"><a href="{% url 'home' %}"> FrameLab </a></span>

            <nav>
                <input name = "query"
                       type="text"
                       placeholder="Пошук"
                       class="form-control"
                       hx-get="{% url 'home' %}"
                       hx-target="#main-content"
                       hx-swap="innerHTML"
                       hx-trigger="keyup changed delay:500ms">
                <ul>
                    <li class="active"><a href="{% url 'home' %}">Головна</a></li>
                    <li class="active"><a href="#footer">Про нас</a></li>
                    <li class="active"><a href="{% url 'topic' %}">Гілки</a></li>
                    <li class="active"><a href="{% url 'chat' %}">AI-чат</a></li>
                    <li class="active"><a
                           hx-get="{% url 'translate' %}"
                           hx-target="#layout"
                           hx-swap="innerHTML"><img src="{% static 'main/img/chinese.png' %}" alt="User"></a></li>
                    {% if user.is_authenticated %}
                    <div class="prof">
                        <li class="btn"><a href="{% url 'profile' request.user.username %}">Профіль</a></li>
                    </div>
                        {% else %}
                    <div class="prof">
                        <li class="btn"><a href="{% url 'login' %}">Вхід</a></li>
                        <li class="btn"><a href="{% url 'signup' %}">Реєстрація</a></li>
                    </div>
                    {% endif %}
                </ul>
            </nav>
        </header>

    </div>
    {% block content %}
    {% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>


<script src="https://unpkg.com/htmx.org@1.9.10"
        integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC"
        crossorigin="anonymous"></script>


<script src="{% static 'main/js/main.js' %}"></script>

<script>
    {% block script %}
    {% endblock %}
</script>


</body>
</html>
