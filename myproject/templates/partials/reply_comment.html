{% for m in replies %}
<div>
    {% if m.reply_to %}
    <a href="{% url 'profile' m.username %}">{{ m.username }}</a>><a href="{% url 'profile' m.reply_to %}">{{ m.reply_to }}</a>
    {% else %}
    <a href="{% url 'profile' m.username %}">{{ m.username }}</a>
    {% endif %}
    <h2>{{ m.reply }}</h2>
    {% if m.id in likes_com %}
        <button>Прибрати лайк {{ m.likes }}</button>
    {% else %}
         <button>Вподобати {{ m.likes }}</button>
    {% endif %}
    {% if user.is_authenticated %}
            <button hx-get="{% url 'get_input_for_reply_on_reply' m.pk m.username %}"
                    hx-target="#reply-on-reply-{{ m.pk }}"
                    hx-swap="innerHTML">Відповісти</button>
            <div id="reply-on-reply-{{ m.pk }}"></div>
    {% else %}
            <form action="{% url 'login' %}">
                <button class="" type="submit">Відповісти</button>
            </form>
    {% endif %}
    {% if m.pk in reply_user %}
    <button hx-get="{% 'delete_reply' m.pk %}"
            hx-target="#reply-{{ m.comment.pk }}"
            hx-swap="innerHTML">Видалити</button>
    {% endif %}
</div>
{% endfor %}
