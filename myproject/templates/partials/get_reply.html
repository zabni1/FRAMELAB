{% for m in replies %}
<div class="comment-card reply-item">
    <div class="comment-meta">
        {% if m.reply_to %}
            <a href="{% url 'profile' m.username %}" class="comment-author">{{ m.username }}</a>
            <span class="reply-arrow">▶️</span>
            <a href="{% url 'profile' m.reply_to %}" class="comment-author">{{ m.reply_to }}</a>
        {% else %}
            <a href="{% url 'profile' m.username %}" class="comment-author">{{ m.username }}</a>
        {% endif %}
    </div>

    <h2 class="comment-text">{{ m.reply }}</h2>

    <div class="comment-actions">
        <div id="like-reply-{{ m.pk }}" class="inline-action">
            {% if user.is_authenticated %}
                <button hx-get="{% if m.id in likes_rep %}{% url 'delete_like_on_reply' m.pk %}{% else %}{% url 'like_reply' m.pk %}{% endif %}"
                        hx-target="#like-reply-{{ m.pk }}"
                        hx-swap="innerHTML"
                        class="{% if m.id in likes_rep %}liked{% endif %}">
                    {% if m.id in likes_rep %}Прибрати лайк{% else %}Вподобати{% endif %} {{ m.all_likes }}
                </button>
            {% else %}
                 <form action="{% url 'login' %}">
                     <button>Вподобати {{ m.all_likes }}</button>
                 </form>
            {% endif %}
        </div>

        {% if user.is_authenticated %}
            <button class="inline-action"
                    hx-get="{% url 'get_input_for_reply_on_reply' pk m.username %}"
                    hx-target="#reply-on-reply-{{ m.pk }}"
                    hx-swap="innerHTML">Відповісти</button>
        {% else %}
            <form action="{% url 'login' %}" class="inline-action">
                <button type="submit">Відповісти</button>
            </form>
        {% endif %}

        {% if m.pk in reply_user %}
            <button class="inline-action delete-btn"
                    hx-get="{% url 'delete_reply' m.pk %}"
                    hx-target="#reply-{{ m.comment.pk }}"
                    hx-swap="innerHTML">Видалити</button>
        {% endif %}
    </div>

    <div id="reply-on-reply-{{ m.pk }}"></div>
</div>
{% endfor %}
