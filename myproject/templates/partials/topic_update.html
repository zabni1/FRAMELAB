<div>
    {% for p in topics %}
    <a href="{{ p.get_absolute_url }}">
    <div>
        <h2>Автор: {{ p.username }}</h2>
        <h1>{{ p.title }}</h1>
        <h3>Категорія: {{ p.category }}</h3>
    </div></a>
    {% endfor %}
</div>
<div id="topic-content"></div>
<div id="loader" class="htmx-indicator">Завантаження...</div>
<div hx-get="{% url 'topic_update_page' page %}"
     hx-target="#topic-content"
     hx-indicator="#loader"
     hx-swap="beforeend"
     hx-trigger="revealed"></div>
