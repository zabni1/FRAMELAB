<div class="topics-list-container profile-topics-side">
    {% for p in topics %}
    <a href="{{ p.get_absolute_url }}" class="topic-card-link">
        <div class="topic-preview-card topic-card-item">
            <div class="meta-column">
                <span class="author-badge">Автор: {{ p.username }}</span>
                <span class="category-text">Категорія: {{ p.category }}</span>
            </div>
            <h1 class="topic-preview-title">{{ p.title }}</h1>
        </div>
    </a>
    {% endfor %}

</div>
