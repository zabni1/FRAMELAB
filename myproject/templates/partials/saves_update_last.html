<div id="saves">
    <div class="grid-container">
        {% for a in saved %}
            <div class="grid-item">
                <a href="{{ a.detail.file.url }}"></a>
                <h3>{{ a.detail.name }}</h3>
                <button hx-get="{% url 'saves_delete' a.id %}"
                        hx-target="#saves"
                        hx-swap="innerHTML">Видалити</button>
            </div>

        {% endfor %}
    </div>
</div>
