<div>
        {% for a in saved %}
        <div>
            <img src="{{ a.detail.photo.url }}">
            {{ a.detail.name }}
            <button hx-get="{% url 'saves_delete' a.id %}"
                    hx-target="#saves"
                    hx-swap="innerHTML">Видалити</button>
        </div>
        {% endfor %}
    </div>
