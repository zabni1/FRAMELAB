{% extends 'main/layout.html' %}
{% load static %}
{% block title %}Оновити профіль{% endblock %}
{% block content %}
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {% if user.photo %}
        <img src="{{ user.photo.url }}">
    {% else %}
        <img src="{{ photo }}">
    {% endif %}
    {{ form.as_p }}
    <button type="submit">Зберегти</button>
</form>
{% endblock %}
