{% extends 'main/layout.html' %}
{% load static %}
{% block title %}Пароль змінено{% endblock %}
{% block content %}
<div class="page-centered-container">
    <div class="profile glass-auth-card info-page-card">
        <div class="success-icon">🔒</div>
        <h2 class="accent-text">Успішно!</h2>
        <p class="info-text-primary">Вітаю, ви змінили пароль!</p>
        <h6 class="login-prompt-text">Тепер ви можете увійти в систему:</h6>
        <div class="margin-top-button">
            <a href="{% url 'login' %}" id="auth_button" class="auth-btn-link">Увійти</a>
        </div>
    </div>
</div>
{% endblock %}
