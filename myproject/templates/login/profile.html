{% extends 'main/layout.html' %}
{% load static %}
{% block title %}Профіль: {{ user.username }}{% endblock %}

{% block content %}
<div class="profile">
    <div class="profile-info-side">
        {% if user.photo %}
            <div class="profile-avatar">
                <img src="{{ user.photo.url }}">
            </div>
        {% else %}
            <div class="profile-avatar">
                <img src="{{ photo }}">
            </div>
            <div class="user-names">
                <b>{{ user.full_name }}</b>
                <span>{{ user.username }}</span>
            </div>
        {% endif %}


    </div>

    <div class="profile-topics-side">
        {% if topics %}
            <div id="topics-user"></div>
            <div id="loader" class="htmx-indicator">Завантаження...</div>
            <div hx-get="{% url 'topic_update_user' page %}"
                 hx-target="#topics-user"
                 hx-indicator="#loader"
                 hx-swap="beforeend"
                 hx-trigger="load"></div>
        {% endif %}
    </div>
</div>
{% endblock %}
