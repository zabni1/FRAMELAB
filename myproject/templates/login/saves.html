{% extends 'main/layout.html' %}
{% load static %}
{% block title %}Збережені{% endblock %}
{% block content %}
{% if saved %}
<div id="saves-content"></div>
<div id="loader" class="htmx-indicator">Завантаження...</div>
<div hx-get="{% url 'saves_update' page %}"
     hx-target="#saves-content"
     hx-indicator="#loader"
     hx-swap="beforeend"
     hx-trigger="revealed"></div>
{% endif %}
{% endblock %}
